name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs of the same workflow on the same ref when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · lint · test
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  gitleaks:
    name: gitleaks scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.24.3
        run: |
          set -euo pipefail
          # Canonical org is gitleaks/gitleaks — the old zricethezav/gitleaks
          # release-asset redirects now 504 persistently after the org move.
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          # Download to a FILE (not piped into tar) with fail-on-error + retries.
          # A piped `curl | tar` feeds a transient CDN error body — e.g. a
          # rate-limited release-asset response — straight into tar, which then
          # dies with a confusing "not in gzip format" and flakes the whole job.
          # -f fails on HTTP errors, --retry survives blips, and extracting from
          # a file surfaces a clear error instead of a broken pipe.
          curl -fSL --retry 5 --retry-delay 3 --retry-all-errors -o /tmp/gitleaks.tar.gz "$url"
          tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin gitleaks
          chmod +x /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks
        run: gitleaks detect --redact --verbose --exit-code 1
